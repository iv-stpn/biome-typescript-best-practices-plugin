name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch full history so changesets can read prior tags/commits
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Configure .npmrc with the npm auth token so `changeset publish` can
      # publish to the registry. No node-version is set, so the runner's
      # default Node is used (avoids the Node 20 deprecation warning).
      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `bun run release` runs `changeset publish`, which publishes to npm
          # when there are pending changesets that have been versioned.
          publish: bun run release
          version: bun run version
          commit: "chore(release): version package"
          title: "chore(release): version package"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "published: ${{ steps.changesets.outputs.published }}" >> $GITHUB_STEP_SUMMARY
